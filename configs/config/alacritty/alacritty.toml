[window]
dimensions = { columns = 120, lines = 24 }
padding = { x = 10, y = 10 }

[font]
size = 10.0
normal = { family = "Fira Code", style = "Retina" }
bold = { family = "Fira Code", style = "Retina" }

[font.offset]
x = 0
y = 6

[font.glyph_offset]
x = 0
y = 3

[cursor]
style = { shape = "Underline", blinking = "Off" }
unfocused_hollow = true

