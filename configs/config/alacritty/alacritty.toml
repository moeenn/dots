[window]
dimensions = { columns = 100, lines = 22 }
padding = { x = 10, y = 10 }

[font]
size = 11.0
normal = { family = "JetBrains Mono", style = "Regular" }
bold = { family = "JetBrains Mono", style = "Regular" }

[font.offset]
x = 0
y = 8

[font.glyph_offset]
x = 0
y = 4

[cursor]
style = { shape = "Underline", blinking = "Off" }
unfocused_hollow = true

[colors.primary]
background = '#282828'
foreground = '#ebdbb2'

[colors.normal]
black   = '#282828'
red     = '#cc241d'
green   = '#98971a'
yellow  = '#d79921'
blue    = '#458588'
magenta = '#b16286'
cyan    = '#689d6a'
white   = '#a89984'

[colors.bright]
black   = '#928374'
red     = '#fb4934'
green   = '#b8bb26'
yellow  = '#fabd2f'
blue    = '#83a598'
magenta = '#d3869b'
cyan    = '#8ec07c'
white   = '#ebdbb2'